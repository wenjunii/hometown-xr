version: 2
updates:
  - package-ecosystem: pip
    directories:
      - "/"
      - "/4090"
      - "/5090"
    schedule:
      interval: weekly
    groups:
      pip:
        patterns:
          - "*"
        exclude-patterns:
          - torch
          - transformers
    # These packages are validated together for each CUDA hardware profile.
    ignore:
      - dependency-name: torch
      - dependency-name: transformers
