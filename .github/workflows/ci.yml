name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements-test.txt
          python -m pip install --no-deps -e .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Compile
        run: python -m compileall -q *.py 4090 tests
